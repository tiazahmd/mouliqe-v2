<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle green glow top-left -->
  <ellipse cx="200" cy="150" rx="400" ry="250" fill="#4ade80" fill-opacity="0.04"/>

  <!-- Grid dots (decorative) -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="900" cy="120" r="1.5"/><circle cx="940" cy="120" r="1.5"/><circle cx="980" cy="120" r="1.5"/><circle cx="1020" cy="120" r="1.5"/><circle cx="1060" cy="120" r="1.5"/><circle cx="1100" cy="120" r="1.5"/>
    <circle cx="900" cy="160" r="1.5"/><circle cx="940" cy="160" r="1.5"/><circle cx="980" cy="160" r="1.5"/><circle cx="1020" cy="160" r="1.5"/><circle cx="1060" cy="160" r="1.5"/><circle cx="1100" cy="160" r="1.5"/>
    <circle cx="900" cy="200" r="1.5"/><circle cx="940" cy="200" r="1.5"/><circle cx="980" cy="200" r="1.5"/><circle cx="1020" cy="200" r="1.5"/><circle cx="1060" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="900" cy="240" r="1.5"/><circle cx="940" cy="240" r="1.5"/><circle cx="980" cy="240" r="1.5"/><circle cx="1020" cy="240" r="1.5"/><circle cx="1060" cy="240" r="1.5"/><circle cx="1100" cy="240" r="1.5"/>
    <circle cx="900" cy="280" r="1.5"/><circle cx="940" cy="280" r="1.5"/><circle cx="980" cy="280" r="1.5"/><circle cx="1020" cy="280" r="1.5"/><circle cx="1060" cy="280" r="1.5"/><circle cx="1100" cy="280" r="1.5"/>
    <circle cx="900" cy="320" r="1.5"/><circle cx="940" cy="320" r="1.5"/><circle cx="980" cy="320" r="1.5"/><circle cx="1020" cy="320" r="1.5"/><circle cx="1060" cy="320" r="1.5"/><circle cx="1100" cy="320" r="1.5"/>
    <circle cx="900" cy="360" r="1.5"/><circle cx="940" cy="360" r="1.5"/><circle cx="980" cy="360" r="1.5"/><circle cx="1020" cy="360" r="1.5"/><circle cx="1060" cy="360" r="1.5"/><circle cx="1100" cy="360" r="1.5"/>
    <circle cx="900" cy="400" r="1.5"/><circle cx="940" cy="400" r="1.5"/><circle cx="980" cy="400" r="1.5"/><circle cx="1020" cy="400" r="1.5"/><circle cx="1060" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="900" cy="440" r="1.5"/><circle cx="940" cy="440" r="1.5"/><circle cx="980" cy="440" r="1.5"/><circle cx="1020" cy="440" r="1.5"/><circle cx="1060" cy="440" r="1.5"/><circle cx="1100" cy="440" r="1.5"/>
    <circle cx="900" cy="480" r="1.5"/><circle cx="940" cy="480" r="1.5"/><circle cx="980" cy="480" r="1.5"/><circle cx="1020" cy="480" r="1.5"/><circle cx="1060" cy="480" r="1.5"/><circle cx="1100" cy="480" r="1.5"/>
  </g>

  <!-- Top green accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#greenLine)"/>

  <!-- Main content area -->
  <g transform="translate(100, 0)">

    <!-- Eyebrow label -->
    <text x="0" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#4ade80" letter-spacing="4" text-transform="uppercase" opacity="0.7">AI SOLUTIONS &amp; DATA ARCHITECTURE</text>

    <!-- Brand name -->
    <text x="0" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="700" fill="white">Mouliqe</text>

    <!-- Tagline -->
    <text x="0" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="rgba(255,255,255,0.45)" font-weight="400">The right solution starts with the right understanding.</text>

    <!-- Divider line -->
    <rect x="0" y="420" width="80" height="2" fill="#4ade80" opacity="0.4"/>

    <!-- URL -->
    <text x="0" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.25)" letter-spacing="1">mouliqe.com</text>

  </g>

  <!-- Bottom border -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#greenLine)"/>
</svg>
