<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

  <style>
    /* ---- JTI-specific visual styles ---- */
    .jti-pipeline { width: 100%; display: flex; flex-direction: column; gap: 0; }
    .jti-pipe-step { display: flex; align-items: stretch; gap: 0.75rem; padding: 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-radius: 0.5rem; }
    .jti-pipe-step:nth-child(1) { border-left: 3px solid var(--p-blue); }
    .jti-pipe-step:nth-child(3) { border-left: 3px solid var(--p-amber); }
    .jti-pipe-step:nth-child(5) { border-left: 3px solid var(--p-purple); }
    .jti-pipe-step:nth-child(7) { border-left: 3px solid var(--p-accent); }
    .jti-pipe-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 0.375rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; flex-shrink: 0; }
    .jti-pipe-icon.capture { background: var(--p-blue-dim); border: 1px solid var(--p-blue); color: var(--p-blue); }
    .jti-pipe-icon.process { background: var(--p-amber-dim); border: 1px solid var(--p-amber); color: var(--p-amber); }
    .jti-pipe-icon.extract { background: rgba(192,132,252,0.1); border: 1px solid var(--p-purple); color: var(--p-purple); }
    .jti-pipe-icon.analyze { background: var(--p-accent-dim); border: 1px solid var(--p-accent); color: var(--p-accent); }
    .jti-pipe-content { flex: 1; }
    .jti-pipe-label { font-size: 0.78rem; font-weight: 700; color: var(--p-fg); }
    .jti-pipe-desc { font-size: 0.65rem; color: var(--p-fg-subtle); line-height: 1.5; margin-top: 0.15rem; }
    .jti-pipe-tags { display: flex; gap: 0.25rem; margin-top: 0.35rem; flex-wrap: wrap; }
    .jti-pipe-tag { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 0.2rem; font-weight: 600; letter-spacing: 0.04em; }
    .jti-pipe-tag.blue { background: var(--p-blue-dim); color: var(--p-blue); }
    .jti-pipe-tag.amber { background: var(--p-amber-dim); color: var(--p-amber); }
    .jti-pipe-tag.purple { background: rgba(192,132,252,0.1); color: var(--p-purple); }
    .jti-pipe-tag.green { background: var(--p-accent-dim); color: var(--p-accent); }
    .jti-pipe-arrow { width: 2px; height: 14px; background: var(--p-border); margin-left: 1.5rem; position: relative; }
    .jti-pipe-arrow::after { content: ''; position: absolute; bottom: -3px; left: -3px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--p-border); }

    /* Tech stack visual */
    .jti-stack { width: 100%; display: flex; flex-direction: column; gap: 0.5rem; }
    .jti-stack-layer { padding: 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-radius: 0.5rem; }
    .jti-stack-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--p-border); }
    .jti-stack-badge { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 0.25rem; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.06em; }
    .jti-stack-badge.edge { background: var(--p-blue-dim); border: 1px solid var(--p-blue); color: var(--p-blue); }
    .jti-stack-badge.pipe { background: var(--p-amber-dim); border: 1px solid var(--p-amber); color: var(--p-amber); }
    .jti-stack-badge.viz { background: var(--p-accent-dim); border: 1px solid var(--p-accent); color: var(--p-accent); }
    .jti-stack-title { font-size: 0.78rem; font-weight: 700; color: var(--p-fg); }
    .jti-stack-items { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; }
    .jti-stack-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.65rem; color: var(--p-fg-muted); }
    .jti-stack-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .jti-stack-dot.blue { background: var(--p-blue); }
    .jti-stack-dot.amber { background: var(--p-amber); }
    .jti-stack-dot.green { background: var(--p-accent); }
    .jti-stack-connector { width: 2px; height: 10px; background: var(--p-border); margin-left: 1.5rem; }
    .jti-stack-output { padding: 0.5rem 0.75rem; background: var(--p-accent-dim); border: 1px solid var(--p-accent-border); border-radius: 0.375rem; text-align: center; }
    .jti-stack-output-label { font-size: 0.6rem; font-weight: 700; color: var(--p-accent); letter-spacing: 0.1em; text-transform: uppercase; }
    .jti-stack-output-items { display: flex; justify-content: center; gap: 0.75rem; margin-top: 0.25rem; }
    .jti-stack-output-item { font-size: 0.6rem; color: var(--p-fg-muted); }

    /* Partnership visual */
    .jti-partner { width: 100%; display: flex; flex-direction: column; gap: 0.5rem; }
    .jti-partner-firm { padding: 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-radius: 0.5rem; }
    .jti-partner-name { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.35rem; }
    .jti-partner-name.parlance { color: var(--p-blue); }
    .jti-partner-name.mouliqe { color: var(--p-accent); }
    .jti-partner-role { font-size: 0.62rem; font-weight: 600; color: var(--p-fg-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .jti-partner-items { display: flex; flex-wrap: wrap; gap: 0.25rem; }

    .jti-partner-pill.blue { background: var(--p-blue-dim); color: var(--p-blue); }
    .jti-partner-pill.green { background: var(--p-accent-dim); color: var(--p-accent); }
    .jti-partner-flow { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.5rem; }
    .jti-partner-flow-arrow { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
    .jti-partner-flow-line { width: 60px; height: 2px; position: relative; }

    .jti-partner-flow-line.up { background: var(--p-accent); }
    .jti-partner-flow-label { font-size: 0.52rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

    .jti-partner-flow-label.green { color: var(--p-accent); }
    .jti-partner-client { padding: 0.5rem 0.75rem; background: var(--p-accent-dim); border: 1px solid var(--p-accent-border); border-radius: 0.375rem; text-align: center; }
    .jti-partner-client-label { font-size: 0.6rem; font-weight: 700; color: var(--p-accent); letter-spacing: 0.1em; text-transform: uppercase; }
    .jti-partner-client-sub { font-size: 0.55rem; color: var(--p-fg-subtle); margin-top: 0.1rem; }

    /* Vision roadmap */
    .jti-roadmap { width: 100%; position: relative; padding-left: 1.75rem; }
    .jti-roadmap-line { position: absolute; left: 0.65rem; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--p-blue), var(--p-amber), var(--p-accent)); }
    .jti-roadmap-phase { position: relative; padding: 0.75rem 0; }
    .jti-roadmap-phase + .jti-roadmap-phase { margin-top: 0.25rem; }
    .jti-roadmap-dot { position: absolute; left: -1.45rem; top: 1rem; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--p-border); background: var(--p-bg-card); }
    .jti-roadmap-dot.p1 { background: var(--p-blue); border-color: var(--p-blue); box-shadow: 0 0 8px rgba(96,165,250,0.3); }
    .jti-roadmap-dot.p2 { background: var(--p-amber); border-color: var(--p-amber); box-shadow: 0 0 8px rgba(251,191,36,0.3); }
    .jti-roadmap-dot.p3 { background: var(--p-accent); border-color: var(--p-accent); box-shadow: 0 0 8px var(--p-accent-glow); }
    .jti-roadmap-card { padding: 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-radius: 0.5rem; }
    .jti-roadmap-card.p1 { border-left: 3px solid var(--p-blue); }
    .jti-roadmap-card.p2 { border-left: 3px solid var(--p-amber); }
    .jti-roadmap-card.p3 { border-left: 3px solid var(--p-accent); }
    .jti-roadmap-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.2rem; }
    .jti-roadmap-label.p1 { color: var(--p-blue); }
    .jti-roadmap-label.p2 { color: var(--p-amber); }
    .jti-roadmap-label.p3 { color: var(--p-accent); }
    .jti-roadmap-title { font-size: 0.82rem; font-weight: 700; color: var(--p-fg); margin-bottom: 0.25rem; }
    .jti-roadmap-desc { font-size: 0.65rem; color: var(--p-fg-subtle); line-height: 1.5; }
    .jti-roadmap-output { font-size: 0.58rem; color: var(--p-fg-faint); margin-top: 0.3rem; font-style: italic; }

    /* Model training visual */
    .jti-model { width: 100%; display: flex; flex-direction: column; gap: 0.375rem; }
    .jti-model-input { padding: 0.625rem 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-left: 3px solid var(--p-blue); border-radius: 0.5rem; }
    .jti-model-core { padding: 0.75rem; background: var(--p-accent-dim); border: 1px solid var(--p-accent-border); border-radius: 0.5rem; text-align: center; }
    .jti-model-output { padding: 0.625rem 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-left: 3px solid var(--p-accent); border-radius: 0.5rem; }
    .jti-model-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
    .jti-model-label.blue { color: var(--p-blue); }
    .jti-model-label.green { color: var(--p-accent); }
    .jti-model-label.core { color: var(--p-accent); font-size: 0.65rem; }
    .jti-model-title { font-size: 0.9rem; font-weight: 700; color: var(--p-accent); margin-bottom: 0.15rem; }
    .jti-model-sub { font-size: 0.6rem; color: var(--p-fg-subtle); }
    .jti-model-items { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .jti-model-tag { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 0.2rem; font-weight: 600; }
    .jti-model-tag.blue { background: var(--p-blue-dim); color: var(--p-blue); }
    .jti-model-tag.green { background: var(--p-accent-dim); color: var(--p-accent); }
    .jti-model-arrow { text-align: center; font-size: 0.7rem; color: var(--p-fg-faint); padding: 0.15rem 0; }

    /* Product flow visual */
    .jti-product { width: 100%; display: flex; flex-direction: column; gap: 0; }
    .jti-product-step { display: flex; align-items: stretch; gap: 0.75rem; padding: 0.65rem 0.75rem; background: var(--p-bg-card); border: 1px solid var(--p-border); border-radius: 0.5rem; }
    .jti-product-step:nth-child(1) { border-left: 3px solid var(--p-blue); }
    .jti-product-step:nth-child(3) { border-left: 3px solid var(--p-amber); }
    .jti-product-step:nth-child(5) { border-left: 3px solid var(--p-accent); }
    .jti-product-num { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .jti-product-num.n1 { background: var(--p-blue-dim); color: var(--p-blue); border: 1px solid var(--p-blue); }
    .jti-product-num.n2 { background: var(--p-amber-dim); color: var(--p-amber); border: 1px solid var(--p-amber); }
    .jti-product-num.n3 { background: var(--p-accent-dim); color: var(--p-accent); border: 1px solid var(--p-accent); }
    .jti-product-label { font-size: 0.78rem; font-weight: 700; color: var(--p-fg); }
    .jti-product-desc { font-size: 0.62rem; color: var(--p-fg-subtle); line-height: 1.5; margin-top: 0.1rem; }
    .jti-product-arrow { width: 2px; height: 12px; background: var(--p-border); margin-left: 1.5rem; position: relative; }
    .jti-product-arrow::after { content: ''; position: absolute; bottom: -3px; left: -3px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--p-border); }
    .jti-product-result { padding: 0.625rem 0.75rem; background: var(--p-accent-dim); border: 1px solid var(--p-accent-border); border-radius: 0.5rem; text-align: center; }
    .jti-product-result-label { font-size: 0.6rem; font-weight: 700; color: var(--p-accent); letter-spacing: 0.1em; text-transform: uppercase; }
    .jti-product-result-sub { font-size: 0.55rem; color: var(--p-fg-subtle); margin-top: 0.1rem; }
    .jti-product-industries { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.35rem; }
    .jti-product-ind { font-size: 0.52rem; padding: 0.1rem 0.35rem; border-radius: 0.2rem; background: var(--p-bg-card); border: 1px solid var(--p-border); color: var(--p-fg-subtle); font-weight: 600; }
  </style>
</head>

    // Patch slides that have custom visuals — inject HTML directly
    const patchedSlides = slides.map(s => {
      if (s.visual && customVisuals[s.visual]) {
        // Replace the visual key with pre-rendered HTML that the engine
        // won't try to look up. We use a trick: set visual to a registered
        // name that returns our HTML. Since we can't modify the engine,
        // we'll inject the visual HTML into the body/subtitle instead
        // by converting to a non-split layout with the visual embedded.

        // Actually, the cleanest approach: remove the visual key and
        // embed the visual HTML into the right column via a custom
        // slide type. But the engine only supports known types.

        // Simplest working approach: keep the visual key but the engine
        // will return '' for unknown visuals. We'll inject our visuals
        // via DOM manipulation after init.
        return s;
      }
      return s;
    });

    engineModule.initPresentation({ meta, slides: patchedSlides });

    // Post-init: inject custom visuals into the DOM
    requestAnimationFrame(() => {
      document.querySelectorAll('.p-slide').forEach(slideEl => {
        const id = slideEl.dataset.id;
        const slideData = slides.find(s => s.id === id);
        if (slideData?.visual && customVisuals[slideData.visual]) {
          const visualContainer = slideEl.querySelector('.p-visual');
          if (visualContainer) {
            visualContainer.innerHTML = customVisuals[slideData.visual]();
          } else {
            // If no .p-visual container (engine returned empty), find the right column
            const rightCol = slideEl.querySelector('.p-split-right');
            if (rightCol) {
              rightCol.innerHTML = `<div class="p-visual">${customVisuals[slideData.visual]()}</div>`;
            }
          }
        }
      });
    });
  </script>
